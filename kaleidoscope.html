<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Kinetic Kaleidoscope: Cinematic Engine</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }
        canvas {
            display: block;
        }
        
        /* UI Overlay Styling with Cloaking Architecture */
        #temporal-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
            
            /* Hidden by default */
            opacity: 0; 
            /* Prevents invisible buttons from intercepting clicks */
            pointer-events: none; 
            /* Hardware-accelerated smooth fade */
            transition: opacity 0.8s ease-in-out; 
        }
        
        /* The Wake State */
        #temporal-controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .time-btn {
            background-color: rgba(255, 255, 255, 0.9);
            color: #000;
            border: none;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .time-btn:hover {
            background-color: #fff;
            transform: scale(1.05);
        }
        .time-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="temporal-controls">
        <button class="time-btn" id="btn-slow">Slow Down</button>
        <button class="time-btn" id="btn-freeze">Freeze Time</button>
        <button class="time-btn" id="btn-reset">Reset Speed</button>
        <button class="time-btn" id="btn-fast">Speed Up</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ==========================================
        // PIPELINE 1: THE LIVING KALEIDOSCOPE
        // ==========================================
        const bgScene = new THREE.Scene();
        const bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float time;
            uniform vec2 resolution;
            
            uniform float u_segments;
            uniform float u_zoom;
            uniform float u_globalRotSpeed;
            uniform vec3 u_colorOffset;

            vec3 palette( in float t ) {
                vec3 a = vec3(0.5, 0.5, 0.5);
                vec3 b = vec3(0.5, 0.5, 0.5);
                vec3 c = vec3(1.0, 1.0, 1.0);
                return a + b * cos( 6.28318 * (c * t + u_colorOffset) );
            }

            mat2 rot(float a) {
                float s = sin(a);
                float c = cos(a);
                return mat2(c, -s, s, c);
            }

            void main() {
                vec2 uv = (gl_FragCoord.xy * 2.0 - resolution.xy) / resolution.y;
                vec2 uv0 = uv;

                uv *= rot(time * u_globalRotSpeed);

                float radius = length(uv);
                float angle = atan(uv.y, uv.x);

                angle = mod(angle, 6.28318 / u_segments);
                angle = abs(angle - (3.14159 / u_segments));

                uv = radius * vec2(cos(angle), sin(angle));

                uv.x += sin(time * 0.2) * 2.0; 
                uv.y += cos(time * 0.3) * 2.0;

                uv *= rot(time * 0.1);

                vec3 finalColor = vec3(0.0);
                
                for (float i = 0.0; i < 3.0; i++) {
                    uv = fract(uv * u_zoom) - 0.5;
                    float d = length(uv) * exp(-length(uv0));
                    vec3 col = palette(length(uv0) + time * 0.4 + i * 0.4);
                    
                    d = sin(d * 8.0 + time) / 8.0;
                    d = abs(d);
                    d = pow(0.01 / d, 1.2); 
                    
                    finalColor += col * d;
                }

                gl_FragColor = vec4(finalColor * 0.8, 1.0); 
            }
        `;

        const uniforms = {
            time: { value: 0.0 },
            resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            u_segments: { value: 6.0 },
            u_zoom: { value: 1.5 },
            u_globalRotSpeed: { value: 0.05 },
            u_colorOffset: { value: new THREE.Vector3(0.263, 0.416, 0.557) }
        };

        const bgMaterial = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: uniforms,
            depthWrite: false, 
        });

        const bgGeometry = new THREE.PlaneGeometry(2, 2);
        const bgMesh = new THREE.Mesh(bgGeometry, bgMaterial);
        bgScene.add(bgMesh);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ==========================================
        // PIPELINE 2: THE UI CLOAKING ENGINE
        // ==========================================
        const uiContainer = document.getElementById('temporal-controls');
        let uiTimeout;

        function wakeUI() {
            // Instantly reveal the interface
            uiContainer.classList.add('visible');
            
            // Destroy any existing countdown
            clearTimeout(uiTimeout);
            
            // Initiate a new 30-second (30,000ms) countdown to hide the UI
            uiTimeout = setTimeout(() => {
                uiContainer.classList.remove('visible');
            }, 30000); 
        }

        // Bind the Wake protocol to all universal inputs and button clicks
        window.addEventListener('mousemove', wakeUI, { passive: true });
        window.addEventListener('wheel', wakeUI, { passive: true });
        window.addEventListener('touchstart', wakeUI, { passive: true });
        window.addEventListener('touchmove', wakeUI, { passive: true });
        uiContainer.addEventListener('click', wakeUI);

        // ==========================================
        // PIPELINE 3: THE UNIFIED HARDWARE ENGINE
        // ==========================================
        const targetState = {
            segments: 6.0,
            zoom: 1.5,
            globalRotSpeed: 0.05,
            colorOffset: new THREE.Vector3(0.263, 0.416, 0.557)
        };

        let scrollDistance = 0;

        function shiftKaleidoscope(delta) {
            scrollDistance += delta;

            targetState.segments = Math.floor(Math.abs(Math.sin(scrollDistance * 0.2)) * 5.0) + 3.0; 
            targetState.zoom = Math.sin(scrollDistance * 0.5) * 0.75 + 1.55; 
            targetState.globalRotSpeed = Math.cos(scrollDistance * 0.3) * 0.08; 
            targetState.colorOffset.set(
                Math.abs(Math.sin(scrollDistance * 0.8)), 
                Math.abs(Math.cos(scrollDistance * 1.1)), 
                Math.abs(Math.sin(scrollDistance * 0.4))
            );
        }

        window.addEventListener('wheel', (event) => {
            shiftKaleidoscope(event.deltaY * 0.005);
        }, { passive: true });

        let touchStartX = 0;

        window.addEventListener('touchstart', (event) => {
            touchStartX = event.touches[0].clientX;
        }, { passive: true });

        window.addEventListener('touchmove', (event) => {
            event.preventDefault(); 
            let touchCurrentX = event.touches[0].clientX;
            let deltaX = touchStartX - touchCurrentX; 
            shiftKaleidoscope(deltaX * 0.015);
            touchStartX = touchCurrentX;
        }, { passive: false });

        // ==========================================
        // PIPELINE 4: THE TEMPORAL CONTROLLER
        // ==========================================
        let timeScale = 1.0;          
        let accumulatedTime = 0.0;    
        
        document.getElementById('btn-slow').addEventListener('click', () => {
            timeScale = Math.max(0.1, timeScale - 0.25);
        });

        document.getElementById('btn-freeze').addEventListener('click', () => {
            timeScale = 0.0; 
        });
        
        document.getElementById('btn-reset').addEventListener('click', () => {
            timeScale = 1.0;
        });
        
        document.getElementById('btn-fast').addEventListener('click', () => {
            timeScale = Math.min(5.0, timeScale + 0.25);
        });

        // ==========================================
        // THE ENGINE LOOP
        // ==========================================
        const clock = new THREE.Clock();
        const lerpSpeed = 0.05; 

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            accumulatedTime += (dt * timeScale);
            uniforms.time.value = accumulatedTime;

            uniforms.u_segments.value += (targetState.segments - uniforms.u_segments.value) * lerpSpeed;
            uniforms.u_zoom.value += (targetState.zoom - uniforms.u_zoom.value) * lerpSpeed;
            uniforms.u_globalRotSpeed.value += (targetState.globalRotSpeed - uniforms.u_globalRotSpeed.value) * lerpSpeed;
            uniforms.u_colorOffset.value.lerp(targetState.colorOffset, lerpSpeed);

            renderer.render(bgScene, bgCamera);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
